apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    editable: true
    jsonData:
      nodeGraph:
        enabled: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: arenabuddy
    user: arenabuddy
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: arenabuddy
      sslmode: disable
      postgresVersion: 1700
    editable: true
